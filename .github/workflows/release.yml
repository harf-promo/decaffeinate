name: Release

# Builds, signs, notarizes, and publishes a DMG when a v* tag is pushed.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEVELOPER_ID_CERT_P12       base64 of your "Developer ID Application" .p12
#   DEVELOPER_ID_CERT_PASSWORD  the .p12 export password
#   DEVELOPER_ID_NAME           e.g. "Developer ID Application: Your Name (TEAMID)"
#   NOTARY_KEY_P8               base64 of your App Store Connect API key (.p8)
#   NOTARY_KEY_ID               the API key id
#   NOTARY_ISSUER_ID            the API key issuer id
# See docs/DISTRIBUTION.md for how to produce these.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Skip the heavy build when the release already has a DMG (e.g. it was built
  # and notarized locally and uploaded ahead of the tag). Keeps tag-triggered
  # releases idempotent and lets a maintainer publish from a local notarized
  # build without this workflow clobbering it.
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" \
               --json assets -q '.assets[].name' 2>/dev/null | grep -q '\.dmg$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release ${GITHUB_REF_NAME} already has a DMG — skipping build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build, sign, notarize, publish
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Preflight — all signing secrets present?
        env:
          CERT: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          DEV_ID: ${{ secrets.DEVELOPER_ID_NAME }}
          NKEY: ${{ secrets.NOTARY_KEY_P8 }}
          NKEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # SPARKLE_KEY is as load-bearing as the signing secrets: SUFeedURL
          # points at latest/download/appcast.xml, so one release published
          # without an appcast silently breaks auto-update for every installed
          # copy. Fail here, before any expensive signing/notarization work.
          missing=""
          for name in CERT CERT_PASSWORD DEV_ID NKEY NKEY_ID NISSUER SPARKLE_KEY; do
            [ -z "${!name}" ] && missing="$missing $name"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing release secrets:$missing — see docs/DISTRIBUTION.md."
            exit 1
          fi

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not a valid version (expected vMAJOR.MINOR.PATCH)."
            exit 1
          fi
          source Scripts/version.sh
          BUILD="$(bundle_version_from_marketing "$VERSION")"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" Resources/Info.plist
          echo "▸ CFBundleVersion → $BUILD (derived from $VERSION, replaces GITHUB_RUN_NUMBER)"

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/cert.p12

      - name: Build & sign app
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
        run: ./Scripts/build-app.sh

      - name: Package DMG
        run: ./Scripts/make-dmg.sh

      - name: Notarize & staple
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY_P8" | base64 --decode > /tmp/notary.p8
          DMG="$(ls build/Decaffeinate-*.dmg)"
          xcrun notarytool submit "$DMG" \
            --key /tmp/notary.p8 \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          rm -f /tmp/notary.p8

      - name: Generate signed appcast (Sparkle)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Presence is enforced by the preflight step; this is just a loud
          # backstop (never a second, separately-worded gate to keep in sync).
          : "${SPARKLE_PRIVATE_KEY:?guaranteed non-empty by the preflight step}"
          KEYFILE="$(mktemp)"; printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"
          BIN=".build/artifacts/sparkle/Sparkle/bin/generate_appcast"
          [ -x "$BIN" ] || { echo "::error::generate_appcast not found at $BIN — Sparkle layout may have changed"; exit 1; }
          STAGE="$(mktemp -d)"; cp build/Decaffeinate-*.dmg "$STAGE/"
          "$BIN" --ed-key-file "$KEYFILE" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/" \
            "$STAGE"
          cp "$STAGE/appcast.xml" build/appcast.xml
          rm -f "$KEYFILE"; rm -rf "$STAGE"

      - name: Checksums
        run: |
          cd build
          shasum -a 256 Decaffeinate-*.dmg | tee SHA256SUMS.txt

      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # `gh release upload` needs the release to exist. Create it if a
          # maintainer didn't pre-create one, so a bare `git push --tags` is
          # enough to ship (previously the upload failed with "release not found").
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" \
                 --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" \
            build/Decaffeinate-*.dmg build/SHA256SUMS.txt --clobber
          # Upload the appcast only when it was generated; but if it exists, a
          # real upload failure must surface as an error (never || true here —
          # a silently missing appcast breaks every in-app updater).
          if [ -f build/appcast.xml ]; then
            gh release upload "${GITHUB_REF_NAME}" build/appcast.xml --clobber
          fi
