<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-label="Decaffeinate">
  <title>Decaffeinate</title>
  <desc>The Decaffeinate mark — the "nightcap": a flat coffee cup (harf-grey) with a single harf-green crescent moon rising like steam. Coffee is the domain; the crescent is the sleep it brings.</desc>
  <defs>
    <mask id="moon">
      <rect width="100" height="100" fill="#000"/>
      <circle cx="62" cy="26" r="8" fill="#fff"/>
      <circle cx="65" cy="23.5" r="6.4" fill="#000"/>
    </mask>
  </defs>
  <!-- saucer -->
  <ellipse cx="46" cy="72" rx="22" ry="4" fill="#939598"/>
  <!-- handle -->
  <path d="M61 44 C 76 44 76 61 60 61" fill="none" stroke="#939598" stroke-width="5.5" stroke-linecap="round"/>
  <!-- cup -->
  <path d="M29.5 38 L62.5 38 L59.7 61 Q59.2 66 54.2 66 L37.8 66 Q32.8 66 32.3 61 Z" fill="#939598"/>
  <!-- crescent (the nightcap moon), rising like steam -->
  <rect width="100" height="100" fill="#A4CD39" mask="url(#moon)"/>
</svg>
